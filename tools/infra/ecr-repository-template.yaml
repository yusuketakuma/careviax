AWSTemplateFormatVersion: '2010-09-09'
Description: PH-OS pilot ECR repository with lifecycle cleanup for low-cost image storage.

Parameters:
  RepositoryName:
    Type: String
    Default: ph-os/app
    AllowedPattern: '^[a-z0-9]+(?:[._/-][a-z0-9]+)*$'
    Description: Private ECR repository name for PH-OS container images.

Resources:
  PhosRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep only the last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["sha-", "pilot"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: ph-os
        - Key: Environment
          Value: pilot
        - Key: ManagedBy
          Value: cloudformation

Outputs:
  RepositoryName:
    Description: ECR repository name.
    Value: !Ref PhosRepository
  RepositoryUri:
    Description: ECR repository URI for Docker push/pull.
    Value: !GetAtt PhosRepository.RepositoryUri
