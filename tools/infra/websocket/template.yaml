AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PH-OS Yjs WebSocket API with room-token authorization and verified-room fan-out.

Parameters:
  StageName:
    Type: String
    Default: prod
  CollaborationRoomTokenSecretArn:
    Type: String
    AllowedPattern: '^arn:aws:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:.+$'
  WebSocketThrottlingBurstLimit:
    Type: Number
    Default: 200
    MinValue: 1
  WebSocketThrottlingRateLimit:
    Type: Number
    Default: 100
    MinValue: 1
  AuthorizerReservedConcurrency:
    Type: Number
    Default: 20
    MinValue: 1
  SyncReservedConcurrency:
    Type: Number
    Default: 50
    MinValue: 1

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        NODE_ENV: production

Resources:
  YjsWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ph-os-yjs-websocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'

  WebSocketAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${YjsWebSocketApi}/${StageName}/access'
      RetentionInDays: 90

  YjsWebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref YjsWebSocketApi
      StageName: !Ref StageName
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt WebSocketAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","routeKey":"$context.routeKey","status":"$context.status","connectionId":"$context.connectionId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime"}'
      DefaultRouteSettings:
        DataTraceEnabled: false
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: !Ref WebSocketThrottlingBurstLimit
        ThrottlingRateLimit: !Ref WebSocketThrottlingRateLimit

  CollaborationRoomAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref YjsWebSocketApi
      Name: ph-os-collaboration-room-authorizer
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerFunction.Arn}/invocations'
      IdentitySource:
        - 'route.request.querystring.token'

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: authorizer/handler.handler
      CodeUri: ./lambdas/
      Description: Validate short-lived PH-OS collaboration room tokens.
      ReservedConcurrentExecutions: !Ref AuthorizerReservedConcurrency
      Environment:
        Variables:
          COLLABORATION_ROOM_TOKEN_SECRET_ARN: !Ref CollaborationRoomTokenSecretArn
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Ref CollaborationRoomTokenSecretArn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - authorizer/handler.ts
        External:
          - '@aws-sdk/*'

  AuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthorizerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${YjsWebSocketApi}/authorizers/*'

  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: connect/handler.handler
      CodeUri: ./lambdas/
      Description: Store verified WebSocket connection context in DynamoDB.
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:PutItem
            Resource: !GetAtt ConnectionsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - connect/handler.ts
        External:
          - '@aws-sdk/*'

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: disconnect/handler.handler
      CodeUri: ./lambdas/
      Description: Remove WebSocket connection context from DynamoDB.
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:DeleteItem
            Resource: !GetAtt ConnectionsTable.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - disconnect/handler.ts
        External:
          - '@aws-sdk/*'

  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sync/handler.handler
      CodeUri: ./lambdas/
      Description: Broadcast binary Yjs messages to peers in the sender's verified room.
      ReservedConcurrentExecutions: !Ref SyncReservedConcurrency
      Environment:
        Variables:
          WEBSOCKET_API_ENDPOINT: !Sub 'https://${YjsWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:DeleteItem
            Resource:
              - !GetAtt ConnectionsTable.Arn
              - !Sub '${ConnectionsTable.Arn}/index/room-index'
        - Statement:
            Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${YjsWebSocketApi}/${StageName}/POST/@connections/*'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - sync/handler.ts
        External:
          - '@aws-sdk/*'

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref YjsWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations'

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref YjsWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations'

  SyncIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref YjsWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SyncFunction.Arn}/invocations'

  ConnectInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${YjsWebSocketApi}/${StageName}/$connect'

  DisconnectInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${YjsWebSocketApi}/${StageName}/$disconnect'

  SyncInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SyncFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${YjsWebSocketApi}/${StageName}/$default'

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref YjsWebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref CollaborationRoomAuthorizer
      Target: !Sub 'integrations/${ConnectIntegration}'

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref YjsWebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${DisconnectIntegration}'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref YjsWebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${SyncIntegration}'

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ph-os-yjs-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: room
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: room-index
          KeySchema:
            - AttributeName: room
              KeyType: HASH
            - AttributeName: connectionId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  WebSocketEndpoint:
    Value: !Sub 'wss://${YjsWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
