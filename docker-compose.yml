services:
  db:
    image: postgres:16-alpine
    container_name: ph-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ph-os_dev}
      POSTGRES_USER: ${POSTGRES_USER:-ph-os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ph-os}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ph-os-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ph-os} -d ${POSTGRES_DB:-ph-os_dev}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ph-os-postgres-data:
