name: AWS Container Image

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for ECR
        required: true
        default: ap-northeast-1
      ecr_repository:
        description: ECR repository name
        required: true
        default: ph-os/app
      image_tag:
        description: Image tag. Leave empty to use sha-<commit>
        required: false
        default: ''
      next_public_app_url:
        description: Public app URL frozen into the browser bundle
        required: true
        default: https://example.invalid
      next_public_cognito_user_pool_id:
        description: Cognito user pool ID frozen into the browser bundle
        required: true
        default: ap-northeast-1_placeholder
      next_public_cognito_client_id:
        description: Cognito app client ID frozen into the browser bundle
        required: true
        default: placeholderclientid

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '11.5.2'

jobs:
  build-and-push:
    name: Build and push PH-OS image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate workflow dispatch inputs
        id: validate-inputs
        shell: bash
        env:
          INPUT_AWS_REGION: ${{ inputs.aws_region }}
          INPUT_ECR_REPOSITORY: ${{ inputs.ecr_repository }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_NEXT_PUBLIC_APP_URL: ${{ inputs.next_public_app_url }}
          INPUT_NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ inputs.next_public_cognito_user_pool_id }}
          INPUT_NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ inputs.next_public_cognito_client_id }}
        run: |
          set -euo pipefail

          fail_input() {
            echo "::error title=Invalid workflow input::$1"
            exit 1
          }

          reject_control_characters() {
            local input_name="$1"
            local input_value="$2"
            if [[ "$input_value" =~ [[:cntrl:]] ]]; then
              fail_input "$input_name contains a control character"
            fi
          }

          reject_control_characters aws_region "$INPUT_AWS_REGION"
          reject_control_characters ecr_repository "$INPUT_ECR_REPOSITORY"
          reject_control_characters image_tag "$INPUT_IMAGE_TAG"
          reject_control_characters next_public_app_url "$INPUT_NEXT_PUBLIC_APP_URL"
          reject_control_characters next_public_cognito_user_pool_id "$INPUT_NEXT_PUBLIC_COGNITO_USER_POOL_ID"
          reject_control_characters next_public_cognito_client_id "$INPUT_NEXT_PUBLIC_COGNITO_CLIENT_ID"

          [[ "$INPUT_AWS_REGION" == "ap-northeast-1" ]] ||
            fail_input "aws_region must be the approved Tokyo region"

          (( ${#INPUT_ECR_REPOSITORY} >= 2 && ${#INPUT_ECR_REPOSITORY} <= 256 )) ||
            fail_input "ecr_repository length is outside the ECR contract"
          [[ "$INPUT_ECR_REPOSITORY" =~ ^[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*(\/[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*)*$ ]] ||
            fail_input "ecr_repository does not match the ECR repository-name contract"

          if [[ -n "$INPUT_IMAGE_TAG" ]]; then
            (( ${#INPUT_IMAGE_TAG} <= 128 )) ||
              fail_input "image_tag exceeds 128 characters"
            [[ "$INPUT_IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]*$ ]] ||
              fail_input "image_tag contains an unsupported character"
            validated_image_tag="$INPUT_IMAGE_TAG"
          else
            validated_image_tag="sha-${GITHUB_SHA::12}"
          fi

          (( ${#INPUT_NEXT_PUBLIC_APP_URL} <= 2048 )) ||
            fail_input "next_public_app_url exceeds 2048 characters"
          [[ "$INPUT_NEXT_PUBLIC_APP_URL" =~ ^https:\/\/[A-Za-z0-9][A-Za-z0-9.-]*(:[0-9]{1,5})?\/?$ ]] ||
            fail_input "next_public_app_url must be an HTTPS origin"

          app_authority="${INPUT_NEXT_PUBLIC_APP_URL#https://}"
          app_authority="${app_authority%/}"
          app_host="$app_authority"
          if [[ "$app_authority" == *:* ]]; then
            app_host="${app_authority%:*}"
            app_port="${app_authority##*:}"
            [[ "$app_port" =~ ^[0-9]{1,5}$ ]] ||
              fail_input "next_public_app_url contains an invalid port"
            app_port_number=$((10#$app_port))
            (( app_port_number >= 1 && app_port_number <= 65535 )) ||
              fail_input "next_public_app_url port is outside 1..65535"
          fi

          (( ${#app_host} <= 253 )) ||
            fail_input "next_public_app_url hostname exceeds 253 characters"
          [[ "$app_host" != *. ]] ||
            fail_input "next_public_app_url contains an empty hostname label"
          [[ "$app_host" != *..* ]] ||
            fail_input "next_public_app_url contains an empty hostname label"
          IFS='.' read -r -a app_host_labels <<< "$app_host"
          for app_host_label in "${app_host_labels[@]}"; do
            (( ${#app_host_label} >= 1 && ${#app_host_label} <= 63 )) ||
              fail_input "next_public_app_url hostname label length is invalid"
            [[ "$app_host_label" =~ ^[A-Za-z0-9]([A-Za-z0-9-]*[A-Za-z0-9])?$ ]] ||
              fail_input "next_public_app_url hostname label is invalid"
          done

          (( ${#INPUT_NEXT_PUBLIC_COGNITO_USER_POOL_ID} <= 55 )) ||
            fail_input "next_public_cognito_user_pool_id exceeds 55 characters"
          [[ "$INPUT_NEXT_PUBLIC_COGNITO_USER_POOL_ID" =~ ^ap-northeast-1_[A-Za-z0-9]+$ ]] ||
            fail_input "next_public_cognito_user_pool_id does not match the approved region"

          (( ${#INPUT_NEXT_PUBLIC_COGNITO_CLIENT_ID} <= 128 )) ||
            fail_input "next_public_cognito_client_id exceeds 128 characters"
          [[ "$INPUT_NEXT_PUBLIC_COGNITO_CLIENT_ID" =~ ^[A-Za-z0-9_+]+$ ]] ||
            fail_input "next_public_cognito_client_id does not match the Cognito contract"

          validated_image_suffix="${INPUT_ECR_REPOSITORY}:${validated_image_tag}"
          {
            printf 'aws_region=%s\n' "$INPUT_AWS_REGION"
            printf 'image_suffix=%s\n' "$validated_image_suffix"
            printf 'next_public_app_url=%s\n' "$INPUT_NEXT_PUBLIC_APP_URL"
            printf 'next_public_cognito_user_pool_id=%s\n' "$INPUT_NEXT_PUBLIC_COGNITO_USER_POOL_ID"
            printf 'next_public_cognito_client_id=%s\n' "$INPUT_NEXT_PUBLIC_COGNITO_CLIENT_ID"
          } >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies for validation
        run: pnpm install --frozen-lockfile

      - name: Validate AWS deployment artifacts
        run: |
          pnpm aws:deploy:readiness
          pnpm aws:github-oidc:template:validate
          pnpm aws:lightsail:template:validate
          pnpm aws:lightsail:runtime:plan -- --json >/tmp/phos-runtime-plan.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ steps.validate-inputs.outputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Compose validated image reference
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_SUFFIX: ${{ steps.validate-inputs.outputs.image_suffix }}
        run: |
          set -euo pipefail
          image="${ECR_REGISTRY}/${IMAGE_SUFFIX}"
          printf 'image=%s\n' "$image" >> "$GITHUB_OUTPUT"
          echo "Validated container image reference prepared."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=production
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_APP_URL=${{ steps.validate-inputs.outputs.next_public_app_url }}
            NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ steps.validate-inputs.outputs.next_public_cognito_user_pool_id }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ steps.validate-inputs.outputs.next_public_cognito_client_id }}
            NEXT_PUBLIC_SENTRY_DSN=
            DATABASE_URL=postgresql://build:build@localhost:5432/build
            DIRECT_URL=postgresql://build:build@localhost:5432/build
            NEXTAUTH_URL=${{ steps.validate-inputs.outputs.next_public_app_url }}
            NEXTAUTH_SECRET=build-time-placeholder-secret
            AUTH_SECRET=build-time-placeholder-secret
            ENCRYPTION_KEY=YnVpbGQtdGltZS1wbGFjZWhvbGRlci0zMmJ5dGVzLTEyMw==
            JWT_SIGNING_SECRET=build-time-placeholder-jwt-secret
            AWS_REGION=${{ steps.validate-inputs.outputs.aws_region }}

      - name: Print runtime plan command
        run: |
          echo "Container image pushed:"
          echo "${{ steps.image.outputs.image }}"
          echo
          echo "Next runtime command:"
          echo "pnpm aws:lightsail:runtime:plan -- --host <STATIC_IP_OR_DOMAIN> --image '${{ steps.image.outputs.image }}' --env-file <UNTRACKED_ENV_FILE>"
