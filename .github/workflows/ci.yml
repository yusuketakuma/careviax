name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '11.5.2'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality gate: lint + typecheck + unit tests
  # ─────────────────────────────────────────────────────────────
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Supply-chain pin check
        run: pnpm supply-chain-pins:check

      - name: Vulnerability control parity check
        run: pnpm vulnerability-controls:check

      - name: Install Gitleaks 8.30.1
        run: tools/scripts/install-gitleaks.sh "$RUNNER_TEMP/gitleaks"

      - name: Secret scan canary
        shell: bash
        run: |
          set -euo pipefail
          canary_dir="$(mktemp -d)"
          trap 'rm -rf "$canary_dir"' EXIT
          printf '%s%s%s\n' 'ghp_' 'A1b2C3d4E5f6G7h8' 'I9j0K1l2M3n4O5p6Q7r8' > "$canary_dir/canary.txt"
          set +e
          gitleaks dir --redact=100 --no-banner --exit-code 42 "$canary_dir" >/dev/null 2>&1
          canary_status=$?
          set -e
          if [ "$canary_status" -ne 42 ]; then
            echo "Gitleaks canary did not produce the expected detection status."
            exit 1
          fi

      - name: Secret scan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          validate_commit() {
            local commit_sha="$1"
            if [[ ! "$commit_sha" =~ ^[0-9a-f]{40}$ ]] || [ "$commit_sha" = "0000000000000000000000000000000000000000" ]; then
              echo "Secret scan received an invalid commit boundary."
              exit 1
            fi
            if ! git cat-file -e "${commit_sha}^{commit}" 2>/dev/null; then
              echo "Secret scan commit boundary is not resolvable."
              exit 1
            fi
          }
          if [ "$EVENT_NAME" = "pull_request" ]; then
            start_sha="$BASE_SHA"
          elif [ "$EVENT_NAME" = "push" ]; then
            start_sha="$BEFORE_SHA"
          else
            echo "Secret scan does not support this event."
            exit 1
          fi
          validate_commit "$start_sha"
          validate_commit "$HEAD_SHA"
          if [ "$start_sha" = "$HEAD_SHA" ]; then
            echo "Secret scan commit range is empty."
            exit 1
          fi
          log_opts="${start_sha}..${HEAD_SHA}"
          scan_log="$(mktemp)"
          trap 'rm -f "$scan_log"' EXIT
          set +e
          gitleaks git --redact=100 --no-banner --log-level error --log-opts="$log_opts" >"$scan_log" 2>&1
          scan_status=$?
          set -e
          rm -f "$scan_log"
          if [ "$scan_status" -ne 0 ]; then
            echo "Secret scan failed or detected a newly introduced secret. Review locally with redaction enabled."
            exit 1
          fi

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Date-slice classification check
        run: pnpm date-slices:check

      - name: State color token check
        run: pnpm colors:check

      - name: Typography minimum check
        run: pnpm typography:check

      - name: Module boundary check
        run: pnpm boundaries:check

      - name: API response shape check
        run: pnpm api-response-shape:check

      - name: API authorization status check
        run: pnpm api-authz-status:check

      - name: API route reachability check
        run: pnpm api-route-reachability:check

      - name: Client JSON schema check
        run: pnpm client-json-schema:check

      - name: Plans active board check
        run: pnpm plans:active:check

      - name: FHIR native foundation drift check
        run: pnpm fhir-native:foundation:check

      - name: FHIR native legacy inventory drift check
        run: pnpm fhir-native:legacy-inventory:check

      - name: Authorization account model inventory drift check
        run: pnpm authz-account-model-v1:inventory:check

      - name: Human-maintained file size check
        run: pnpm human-maintained-file-size:check

      - name: DB query shape check
        run: pnpm db:query-shape:check

      - name: DB read path SLO check
        run: pnpm db:read-slo:check

      - name: Frontend contract check
        run: pnpm frontend-contract:check

      - name: Client PHI log check
        run: pnpm client-phi-log:check

      - name: DTO direct Prisma return check
        run: pnpm dto-direct-prisma-return:check

      - name: Route auth wrapper check
        run: pnpm route-auth-wrapper:check

      - name: Operational task type registry check
        run: pnpm task-types:check

      - name: RLS policy contract check
        run: pnpm rls-policy-contract:check

      - name: EventBridge schedule definition check
        run: pnpm eventbridge-schedules:check

      - name: Workflow dispatch input safety check
        run: pnpm workflow-dispatch-input-safety:check

      - name: Type check
        run: pnpm typecheck

      - name: TypeScript no-unused check
        run: NODE_OPTIONS=--max-old-space-size=16384 pnpm typecheck:no-unused

      - name: Unit tests with coverage
        run: pnpm test:coverage
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzMTIzNDU2'
          JWT_SIGNING_SECRET: 'test-jwt-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          AWS_REGION: 'ap-northeast-1'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: 'ap-northeast-1_test'
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 'test-client-id'

      - name: Schedule time timezone regression tests
        run: |
          for timezone in Asia/Tokyo UTC America/Los_Angeles; do
            echo "Running schedule time regression tests with TZ=${timezone}"
            TZ="${timezone}" pnpm test:schedule-time:tz
          done
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzMTIzNDU2'
          JWT_SIGNING_SECRET: 'test-jwt-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          AWS_REGION: 'ap-northeast-1'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: 'ap-northeast-1_test'
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 'test-client-id'

      - name: PH-OS deploy artifact proof
        run: pnpm phos:deploy-template:validate:artifact

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzMTIzNDU2'
          JWT_SIGNING_SECRET: 'test-jwt-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          AWS_REGION: 'ap-northeast-1'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: 'ap-northeast-1_test'
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 'test-client-id'
          NEXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_AUTH_TOKEN: ''
          SENTRY_ORG: ''
          SENTRY_PROJECT: ''

  # ─────────────────────────────────────────────────────────────
  # Migration gate: execute raw SQL migrations and verify DB audit triggers
  # ─────────────────────────────────────────────────────────────
  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ph_os
          POSTGRES_PASSWORD: ph_os
          POSTGRES_DB: ph_os_migration
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U ph_os -d ph_os_migration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://ph_os:ph_os@localhost:5434/ph_os_migration?schema=public
      DIRECT_URL: postgresql://ph_os:ph_os@localhost:5434/ph_os_migration?schema=public

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations
        run: pnpm --config.verify-deps-before-run=false exec prisma migrate deploy --schema=prisma/schema/

      - name: Verify PH-OS audit migration
        run: pnpm --config.verify-deps-before-run=false db:verify-ph-os-audit-migration

  # ─────────────────────────────────────────────────────────────
  # PH-OS backend RLS gate: prove tenant isolation on a real PostgreSQL engine
  # ─────────────────────────────────────────────────────────────
  phos-aurora-rls-gate:
    name: PH-OS Aurora RLS Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ph_os
          POSTGRES_PASSWORD: ph_os
          POSTGRES_DB: ph_os_rls
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U ph_os -d ph_os_rls"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      PHOS_AURORA_RLS_TEST_DATABASE_URL: postgresql://ph_os:ph_os@localhost:5435/ph_os_rls
      # Superuser connection used only to seed/DDL the throwaway proof schema.
      RLS_PROOF_ADMIN_DATABASE_URL: postgresql://ph_os:ph_os@localhost:5435/ph_os_rls
      # Non-superuser (NOSUPERUSER NOBYPASSRLS) role actually under test — this is
      # the connection that must be denied cross-org rows by FORCE ROW LEVEL SECURITY.
      RLS_PROOF_DATABASE_URL: postgresql://ph_os_app:ph_os_app@localhost:5435/ph_os_rls

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Provision non-superuser RLS proof role (ph_os_app)
        run: psql "$RLS_PROOF_ADMIN_DATABASE_URL" -v ON_ERROR_STOP=1 -f tools/scripts/setup-rls-test-role.sql

      - name: Verify PH-OS FeeRule RLS
        run: pnpm exec vitest run src/phos/infra/aurora-fee-rules-rls.integration.test.ts --reporter=dot

      - name: Prove FORCE RLS denies a non-superuser cross-org rows
        run: pnpm exec vitest run src/lib/db/rls.test.ts --reporter=dot

  # ─────────────────────────────────────────────────────────────
  # Medical UI/UX gate: production build + local E2E DB + Playwright/axe
  # ─────────────────────────────────────────────────────────────
  medical-ui-e2e-gate:
    name: Medical UI E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ci, migration-gate]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ph_os
          POSTGRES_PASSWORD: ph_os
          POSTGRES_DB: ph_os_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ph_os -d ph_os_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://ph_os:ph_os@localhost:5433/ph_os_e2e?schema=public
      DIRECT_URL: postgresql://ph_os:ph_os@localhost:5433/ph_os_e2e?schema=public
      PLAYWRIGHT: '1'
      AUTH_SECRET: ph-os-local-auth-secret
      NEXTAUTH_SECRET: ph-os-local-auth-secret
      NEXTAUTH_URL: http://localhost:3012
      NEXT_PUBLIC_DISABLE_NOTIFICATION_STREAM: '1'
      NEXT_FONT_GOOGLE_MOCKED_RESPONSES: ${{ github.workspace }}/tools/tests/helpers/next-font-google-mocked-responses.cjs

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare E2E database
        run: pnpm --config.verify-deps-before-run=false db:e2e:prepare

      - name: Provision non-superuser PostgreSQL integration role (ph_os_app)
        env:
          # psql/libpq does not accept Prisma's `?schema=public` URL parameter.
          RLS_PROOF_ADMIN_DATABASE_URL: postgresql://ph_os:ph_os@localhost:5433/ph_os_e2e
        run: pnpm --config.verify-deps-before-run=false db:e2e:rls-proof-role

      - name: Run required PostgreSQL integration manifest
        env:
          POSTGRES_INTEGRATION_ADMIN_DATABASE_URL: ${{ env.DATABASE_URL }}
          POSTGRES_INTEGRATION_RLS_APP_DATABASE_URL: postgresql://ph_os_app:ph_os_app@localhost:5433/ph_os_e2e?schema=public
          POSTGRES_INTEGRATION_DISPOSABLE_DB: github-actions-postgres-service
        run: pnpm --config.verify-deps-before-run=false test:postgres-integration:manifest

      - name: Verify stable cursor pagination ordering
        env:
          PAGINATION_ORDER_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: pnpm exec vitest run src/lib/db/stable-cursor-order.integration.test.ts --reporter=dot

      - name: Run production medical UI/UX gate
        run: pnpm --config.verify-deps-before-run=false medical-ui:e2e:gate:prod

  # ─────────────────────────────────────────────────────────────
  # PR preview: comment Amplify preview URL on the pull request
  # ─────────────────────────────────────────────────────────────
  preview-url:
    name: Comment Preview URL
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: ci
    permissions:
      pull-requests: write

    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const appId = process.env.AMPLIFY_APP_ID;
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref
              .replace(/[^a-zA-Z0-9-]/g, '-')
              .toLowerCase()
              .slice(0, 50);
            const previewUrl = appId
              ? `https://pr-${prNumber}.${branchName}.${appId}.amplifyapp.com`
              : '(Amplify preview URL — configure AMPLIFY_APP_ID secret)';

            const body = [
              '## Preview Deploy',
              '',
              `**Preview URL**: ${previewUrl}`,
              '',
              '_This preview is built and hosted by AWS Amplify Hosting._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}

  # ─────────────────────────────────────────────────────────────
  # Production deploy — requires manual approval via GitHub
  # Environment protection rule (Settings → Environments →
  # "production" → Required reviewers)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, medical-ui-e2e-gate]
    environment: production # ← requires reviewer approval
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Trigger Amplify production build
        run: |
          aws amplify start-job \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name main \
            --job-type RELEASE \
            --output json | tee amplify-job.json

          JOB_ID=$(jq -r '.jobSummary.jobId' amplify-job.json)
          echo "Amplify job started: $JOB_ID"
          echo "AMPLIFY_JOB_ID=$JOB_ID" >> "$GITHUB_ENV"

      - name: Wait for Amplify build to succeed
        run: |
          echo "Waiting for job $AMPLIFY_JOB_ID to complete..."
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
              --branch-name main \
              --job-id "$AMPLIFY_JOB_ID" \
              --query 'job.summary.status' \
              --output text)
            echo "  [$i/30] status=$STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Build succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build $STATUS. Check the Amplify console."
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for build."
          exit 1
