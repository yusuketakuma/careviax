name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality gate: lint + typecheck + unit tests
  # ─────────────────────────────────────────────────────────────
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzMTIzNDU2'
          JWT_SIGNING_SECRET: 'test-jwt-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          AWS_REGION: 'ap-northeast-1'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: 'ap-northeast-1_test'
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 'test-client-id'

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          NEXTAUTH_SECRET: 'test-secret-for-ci'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzMTIzNDU2'
          JWT_SIGNING_SECRET: 'test-jwt-secret'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          AWS_REGION: 'ap-northeast-1'
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  # ─────────────────────────────────────────────────────────────
  # PR preview: comment Amplify preview URL on the pull request
  # ─────────────────────────────────────────────────────────────
  preview-url:
    name: Comment Preview URL
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: ci
    permissions:
      pull-requests: write

    steps:
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const appId = process.env.AMPLIFY_APP_ID;
            const prNumber = context.payload.pull_request.number;
            const branchName = context.payload.pull_request.head.ref
              .replace(/[^a-zA-Z0-9-]/g, '-')
              .toLowerCase()
              .slice(0, 50);
            const previewUrl = appId
              ? `https://pr-${prNumber}.${branchName}.${appId}.amplifyapp.com`
              : '(Amplify preview URL — configure AMPLIFY_APP_ID secret)';

            const body = [
              '## Preview Deploy',
              '',
              `**Preview URL**: ${previewUrl}`,
              '',
              '_This preview is built and hosted by AWS Amplify Hosting._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}

  # ─────────────────────────────────────────────────────────────
  # Production deploy — requires manual approval via GitHub
  # Environment protection rule (Settings → Environments →
  # "production" → Required reviewers)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    environment: production # ← requires reviewer approval
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Trigger Amplify production build
        run: |
          aws amplify start-job \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name main \
            --job-type RELEASE \
            --output json | tee amplify-job.json

          JOB_ID=$(jq -r '.jobSummary.jobId' amplify-job.json)
          echo "Amplify job started: $JOB_ID"
          echo "AMPLIFY_JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for Amplify build to succeed
        run: |
          echo "Waiting for job $AMPLIFY_JOB_ID to complete..."
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
              --branch-name main \
              --job-id "$AMPLIFY_JOB_ID" \
              --query 'job.summary.status' \
              --output text)
            echo "  [$i/30] status=$STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Build succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build $STATUS. Check the Amplify console."
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for build."
          exit 1
