################################################################################
# Project-local Codex configuration
# Keep runtime-like keys in ~/.codex/*.config.toml so --profile fast/goal/max
# can select the intended model, reasoning, service tier, and search behavior.
# Keep PH-OS-specific behavior in AGENTS.md.
################################################################################
project_doc_max_bytes = 131072
project_doc_fallback_filenames = [
  "CLAUDE.md",
  ".agents.md",
  "TEAM_GUIDE.md",
  "CONTRIBUTING.md"
]
[agents]
max_threads = 32
max_depth = 2
job_max_runtime_seconds = 7200

[agents.code_mapper]
description = "Read-only PH-OS/CareViaX code mapper for fast impact-radius, ownership, route/service/test, and data-flow mapping before implementation."
config_file = "agents/code_mapper.toml"
nickname_candidates = ["Mapper", "Locator", "Surface"]

[agents.explorer-deep]
description = "Read-only PH-OS/CareViaX mapper for architecture, dependencies, data flow, impact radius, hidden coupling, and medical/privacy risk surfaces."
config_file = "agents/explorer-deep.toml"
nickname_candidates = ["Mapper", "Cartographer", "Tracer"]

[agents.implementation_planner]
description = "Read-only PH-OS/CareViaX implementation planner for scoped phases, file touch-lists, risk controls, validation plans, and rollback strategy."
config_file = "agents/implementation_planner.toml"
nickname_candidates = ["Planner", "Sequencer", "Runbook"]

[agents.spec_guardian]
description = "Read-only PH-OS/CareViaX spec guardian for PLANS.md, AGENTS.md, PH-OS acceptance criteria, and implementation/spec drift."
config_file = "agents/spec_guardian.toml"
nickname_candidates = ["Spec", "Guardian", "Acceptance"]

[agents.architect]
description = "Read-only PH-OS/CareViaX architect for module boundaries, dependency direction, abstractions, data ownership, and long-term maintainability."
config_file = "agents/architect.toml"
nickname_candidates = ["Architect", "Boundary", "Systems"]

[agents.maintainer]
description = "Implementation agent for scoped PH-OS/CareViaX fixes; only edits explicitly delegated paths and proves changes with focused validation."
config_file = "agents/maintainer.toml"
nickname_candidates = ["Maintainer", "Patch", "Builder"]

[agents.worker-fixer]
description = "Implementation agent for scoped PH-OS/CareViaX fixes after investigation, preserving shared-worktree ownership and proving changes with validation."
config_file = "agents/worker-fixer.toml"
nickname_candidates = ["Maintainer", "Patch", "Builder"]

[agents.verifier]
description = "PH-OS/CareViaX verifier for objective evidence: tests, typecheck, lint, build, browser checks, gate serialization, and validation summaries."
config_file = "agents/verifier.toml"
nickname_candidates = ["Verifier", "Evidence", "Gate"]

[agents.db_steward]
description = "Read-only PH-OS/CareViaX DB steward for schema, constraints, RLS/requestContext, migrations, query shape, transactions, and SELECT-only data checks."
config_file = "agents/db_steward.toml"
nickname_candidates = ["DB Steward", "Constraint", "Ledger"]

[agents.api_contract_reviewer]
description = "Read-only PH-OS/CareViaX API contract reviewer for request/response shape, status codes, no-store envelopes, idempotency, and compatibility."
