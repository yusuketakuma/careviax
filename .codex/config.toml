################################################################################
# Project-local Codex configuration
# Codex CLI 0.138.0 loads trusted project-scoped config on top of
# ~/.codex/config.toml. Keep runtime-like keys here aligned with the user-level
# goal profile, and keep PH-OS-specific behavior in AGENTS.md.
################################################################################
model = "gpt-5.5"
review_model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_supports_reasoning_summaries = true
model_verbosity = "medium"
personality = "pragmatic"
service_tier = "flex"
web_search = "live"
project_doc_max_bytes = 131072
project_doc_fallback_filenames = [
  "CLAUDE.md",
  ".agents.md",
  "TEAM_GUIDE.md",
  "CONTRIBUTING.md"
]
[agents]
max_threads = 10
max_depth = 2
job_max_runtime_seconds = 7200

[agents.explorer-deep]
description = "Read-only deep codebase explorer for architecture, dependency, impact-radius, and hidden-coupling analysis."
config_file = "agents/explorer-deep.toml"
nickname_candidates = ["explorer-deep"]

[agents.worker-fixer]
description = "Implementation agent for fixing bugs, validation failures, integration issues, and repository-wide defects."
config_file = "agents/worker-fixer.toml"
nickname_candidates = ["worker-fixer"]

[agents.security-auditor]
description = "Read-only security reviewer for auth, authorization, injection, secrets, input validation, and dependency risk."
config_file = "agents/security-auditor.toml"
nickname_candidates = ["security-auditor"]

[agents.performance-auditor]
description = "Read-only performance reviewer for N+1, repeated I/O, redundant computation, rendering waste, memory pressure, and blocking paths."
config_file = "agents/performance-auditor.toml"
nickname_candidates = ["performance-auditor"]

[agents.test-auditor]
description = "Read-only test and validation reviewer for missing coverage, flaky tests, weak assertions, and broken CI assumptions."
config_file = "agents/test-auditor.toml"
nickname_candidates = ["test-auditor"]

[agents.reviewer-strict]
description = "Read-only strict reviewer for correctness, maintainability, regression risk, validation quality, and hidden side effects."
config_file = "agents/reviewer-strict.toml"
nickname_candidates = ["reviewer-strict"]
[features]
fast_mode = false
goals = true
multi_agent = true
personality = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
unified_exec = true
enable_request_compression = true
prevent_idle_sleep = true
memories = true
hooks = true
apps = false
browser_use = false
browser_use_external = false
computer_use = false
in_app_browser = false
[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
[tools]
view_image = true
