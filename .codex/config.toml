[features]
fast_mode = true
goals = true
multi_agent = true
personality = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
unified_exec = true
enable_request_compression = true
prevent_idle_sleep = true
memories = true
hooks = true
apps = false
browser_use = false
browser_use_external = false
computer_use = false
in_app_browser = false
[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
[tools]
view_image = true
