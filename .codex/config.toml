################################################################################
# Project-local Codex configuration
# Keep runtime-like keys in ~/.codex/*.config.toml so --profile fast/goal/max
# can select the intended model, reasoning, service tier, and search behavior.
# Keep PH-OS-specific behavior in AGENTS.md.
################################################################################
project_doc_max_bytes = 131072
project_doc_fallback_filenames = [
  "CLAUDE.md",
  ".agents.md",
  "TEAM_GUIDE.md",
  "CONTRIBUTING.md"
]
[agents]
max_threads = 32
max_depth = 2
job_max_runtime_seconds = 7200

[agents.explorer-deep]
description = "Read-only PH-OS/CareViaX mapper for architecture, dependencies, data flow, impact radius, hidden coupling, and medical/privacy risk surfaces."
config_file = "agents/explorer-deep.toml"
nickname_candidates = ["Mapper", "Cartographer", "Tracer"]

[agents.worker-fixer]
description = "Implementation agent for scoped PH-OS/CareViaX fixes after investigation, preserving shared-worktree ownership and proving changes with validation."
config_file = "agents/worker-fixer.toml"
nickname_candidates = ["Maintainer", "Patch", "Builder"]

[agents.medical_safety_reviewer]
description = "Read-only PH-OS/CareViaX medical safety reviewer for patient identity, medication codes, prescriptions, allergies, dosage, inventory consistency, scheduling, and auditability."
config_file = "agents/medical_safety_reviewer.toml"
nickname_candidates = ["Clinical Safety", "Medication Safety", "Patient Safety"]

[agents.privacy_compliance_reviewer]
description = "Read-only PH-OS/CareViaX privacy reviewer for PHI/PII minimization, no-store responses, logs, exports, print/PDF/CSV leakage, audit minimization, and memory/agmsg redaction."
config_file = "agents/privacy_compliance_reviewer.toml"
nickname_candidates = ["Privacy", "Masker", "Steward"]

[agents.security-auditor]
description = "Read-only PH-OS/CareViaX security auditor for tenant boundaries, authz, PHI leakage, injection, unsafe side effects, and dependency risk."
config_file = "agents/security-auditor.toml"
nickname_candidates = ["Locksmith", "Boundary", "Redline"]

[agents.performance-auditor]
description = "Read-only PH-OS/CareViaX performance auditor for N+1 queries, repeated I/O, redundant computation, render waste, memory pressure, and blocking paths."
config_file = "agents/performance-auditor.toml"
nickname_candidates = ["Profiler", "Latency", "Throughput"]

[agents.test-auditor]
description = "Read-only PH-OS/CareViaX test auditor for missing medical/privacy regression coverage, flaky tests, weak assertions, fixtures, and broken CI assumptions."
config_file = "agents/test-auditor.toml"
nickname_candidates = ["Testwright", "Matrix", "Fixture"]

[agents.reviewer-strict]
description = "Read-only strict PH-OS/CareViaX reviewer for correctness, maintainability, medical/privacy regressions, validation quality, and hidden side effects."
config_file = "agents/reviewer-strict.toml"
nickname_candidates = ["Strict", "Sentinel", "Checker"]
[features]
fast_mode = true
goals = true
multi_agent = true
personality = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
unified_exec = true
enable_request_compression = true
prevent_idle_sleep = true
memories = true
hooks = true
apps = false
browser_use = false
browser_use_external = false
computer_use = false
in_app_browser = false
[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
[tools]
view_image = true
