################################################################################
# Project-local Codex configuration
# Keep runtime-like keys in ~/.codex/*.config.toml so --profile fast/goal/max
# can select the intended model, reasoning, service tier, and search behavior.
# Keep PH-OS-specific behavior in AGENTS.md.
#
# CareViaX uses one Codex CLI seat (codex1). agmsg remains enabled for automatic
# inbox delivery and the human control plane. Custom agents remain disabled.
################################################################################
project_doc_max_bytes = 131072
project_doc_fallback_filenames = [
  "CLAUDE.md",
  ".agents.md",
  "TEAM_GUIDE.md",
  "CONTRIBUTING.md"
]

[features]
fast_mode = true
goals = true
multi_agent = false
personality = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
unified_exec = true
enable_request_compression = true
prevent_idle_sleep = true
memories = true
hooks = true
apps = false
browser_use = false
browser_use_external = false
computer_use = false
in_app_browser = false

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
